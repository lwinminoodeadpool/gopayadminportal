[build]
  command = "npm run build"
  publish = "dist"
  [build.environment]
    NODE_VERSION = "22"

[[redirects]]
  from = "/baas/*"
  to = "/.netlify/functions/proxy/baas/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/service/*"
  to = "/.netlify/functions/proxy/service/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
